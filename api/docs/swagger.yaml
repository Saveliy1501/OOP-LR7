paths:
  /weather:
    get:
      description: Returns current weather for given coordinates
      parameters:
      - default: "18.300231990440125"
        description: Latitude
        in: query
        name: lat
        required: true
        type: string
      - default: "-64.8251590359234"
        description: Longitude
        in: query
        name: lon
        required: true
        type: string
      - description: Weather provider
        enum:
        - openweather
        - openmeteo
        in: query
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared_responses.SuccessResponse-models_weather_CurrentWeather'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared_responses.StatusResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared_responses.StatusResponse'
      summary: Get Current Weather
      tags:
      - weather
  /weather/forecast:
    get:
      description: Returns weather forecast for 5 days
      parameters:
      - default: "53.9"
        description: Latitude
        in: query
        name: lat
        required: true
        type: string
      - default: "27.5667"
        description: Longitude
        in: query
        name: lon
        required: true
        type: string
      - description: Weather provider
        enum:
        - openweather
        - openmeteo
        in: query
        name: provider
        required: true
        type: string
      produces:
